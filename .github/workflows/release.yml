name: Release

on:
  push:
    tags: ["v*"]

jobs:
  server-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export
        uses: docker/build-push-action@v5
        with:
          context: packages/server
          tags: skillbase/server:latest
          outputs: type=docker,dest=/tmp/server.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-docker
          path: /tmp/server.tar

  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        working-directory: packages/client

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system deps (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci || npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: skillbase-${{ matrix.platform.target }}
          path: packages/client/src-tauri/target/release/bundle/
