name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/client/src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Check format
        run: cargo fmt --check || true

      - name: Clippy
        run: cargo clippy -- -D warnings || true

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  rust-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci || npm install

      - name: TypeScript check
        run: npx tsc --noEmit || true
